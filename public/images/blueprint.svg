<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" fill="none" stroke="#8a847c" stroke-width="1.4" stroke-linejoin="round">
  <g opacity="0.9">
    <!-- outer building envelope -->
    <rect x="120" y="110" width="660" height="700" stroke-width="2.2"/>
    <rect x="138" y="128" width="624" height="664"/>
    <!-- main partitions -->
    <line x1="450" y1="128" x2="450" y2="792"/>
    <line x1="138" y1="430" x2="762" y2="430"/>
    <line x1="138" y1="610" x2="450" y2="610"/>
    <line x1="600" y1="430" x2="600" y2="792"/>
    <!-- rooms upper-left -->
    <line x1="290" y1="128" x2="290" y2="430"/>
    <line x1="290" y1="300" x2="450" y2="300"/>
    <!-- door swings (arcs) -->
    <path d="M290 360 A40 40 0 0 1 330 400" />
    <path d="M450 470 A46 46 0 0 0 496 516" />
    <path d="M600 470 A40 40 0 0 1 640 510" />
    <path d="M210 610 A38 38 0 0 1 248 648" />
    <!-- stair core -->
    <g stroke-width="1.1">
      <rect x="500" y="150" width="150" height="160"/>
      <line x1="500" y1="170" x2="650" y2="170"/>
      <line x1="500" y1="190" x2="650" y2="190"/>
      <line x1="500" y1="210" x2="650" y2="210"/>
      <line x1="500" y1="230" x2="650" y2="230"/>
      <line x1="500" y1="250" x2="650" y2="250"/>
      <line x1="500" y1="270" x2="650" y2="270"/>
      <line x1="500" y1="290" x2="650" y2="290"/>
      <line x1="575" y1="150" x2="575" y2="310"/>
    </g>
    <!-- glazing / curtain-wall ticks on right facade -->
    <g stroke-width="1">
      <line x1="762" y1="150" x2="788" y2="150"/>
      <line x1="762" y1="210" x2="788" y2="210"/>
      <line x1="762" y1="270" x2="788" y2="270"/>
      <line x1="762" y1="330" x2="788" y2="330"/>
      <line x1="762" y1="500" x2="788" y2="500"/>
      <line x1="762" y1="560" x2="788" y2="560"/>
      <line x1="762" y1="620" x2="788" y2="620"/>
      <line x1="762" y1="680" x2="788" y2="680"/>
    </g>
    <!-- dimension line -->
    <g stroke-width="0.9">
      <line x1="120" y1="60" x2="780" y2="60"/>
      <line x1="120" y1="50" x2="120" y2="70"/>
      <line x1="450" y1="50" x2="450" y2="70"/>
      <line x1="780" y1="50" x2="780" y2="70"/>
    </g>
    <!-- furniture hints -->
    <rect x="170" y="160" width="90" height="60" stroke-width="0.9"/>
    <circle cx="360" cy="540" r="34" stroke-width="0.9"/>
    <rect x="640" y="650" width="90" height="100" stroke-width="0.9"/>
  </g>
</svg>
